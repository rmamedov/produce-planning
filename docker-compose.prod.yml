services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/public/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  scheduler:
    image: curlimages/curl:8.12.1
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    env_file:
      - .env.production
    command:
      - /bin/sh
      - -lc
      - |
        while true; do
          echo "Triggering task generator at $(date -Iseconds)"
          curl --fail --silent --show-error \
            -X POST \
            -H "x-task-generator-secret: ${TASK_GENERATOR_SECRET}" \
            http://app:3000/api/tasks/generate || true
          sleep ${GENERATION_INTERVAL_SECONDS:-900}
        done

volumes:
  postgres_data:
  uploads_data:
